services:
  postgres:
    image: postgres:16-alpine
    container_name: vegy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vegy
      POSTGRES_PASSWORD: vegy123
      POSTGRES_DB: vegy
    ports:
      - "5433:5432"
    volumes:
      - vegy_postgres_data:/var/lib/postgresql/data

volumes:
  vegy_postgres_data:
